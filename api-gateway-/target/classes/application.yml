server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: customer-service
          uri: http://customer-service:8081
          predicates:
            - Path=/customers/**

        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/products/**

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/orders/**

        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/payments/**
          filters:
            - name: CircuitBreaker
              args:
                name: paymentCircuitBreaker
                fallbackUri: forward:/fallback/payments

        - id: inventory-service
          uri: http://inventory-service:8085
          predicates:
            - Path=/inventorys/**

resilience4j:
  circuitbreaker:
    instances:
      paymentCircuitBreaker:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
